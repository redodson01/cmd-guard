name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../cmd-guard-${{ matrix.target }}.tar.gz cmd-guard
      - uses: actions/upload-artifact@v4
        with:
          name: cmd-guard-${{ matrix.target }}
          path: cmd-guard-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            cmd-guard-*.tar.gz
      - name: Update Homebrew formula
        # secrets context is not available in `if` expressions, so we check
        # the job-level env var instead.
        if: env.HOMEBREW_TAP_TOKEN != ''
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_LINUX_X86=$(sha256sum cmd-guard-x86_64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM=$(sha256sum cmd-guard-aarch64-unknown-linux-gnu.tar.gz | awk '{print $1}')
          SHA_MACOS_X86=$(sha256sum cmd-guard-x86_64-apple-darwin.tar.gz | awk '{print $1}')
          SHA_MACOS_ARM=$(sha256sum cmd-guard-aarch64-apple-darwin.tar.gz | awk '{print $1}')

          sed -e "s/VERSION_PLACEHOLDER/$VERSION/g" \
              -e "s/SHA_MACOS_X86/$SHA_MACOS_X86/g" \
              -e "s/SHA_MACOS_ARM/$SHA_MACOS_ARM/g" \
              -e "s/SHA_LINUX_X86/$SHA_LINUX_X86/g" \
              -e "s/SHA_LINUX_ARM/$SHA_LINUX_ARM/g" \
              formula/cmd-guard.rb > /tmp/cmd-guard.rb

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/redodson01/homebrew-tap.git" /tmp/tap
          cd /tmp/tap
          cp /tmp/cmd-guard.rb cmd-guard.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cmd-guard.rb
          git diff --cached --quiet || { git commit -m "cmd-guard ${VERSION}" && git push; }
